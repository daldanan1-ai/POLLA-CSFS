<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Polla Tricolor · Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A1524; --bg2:#0E1F33; --surface:#152A41; --surface2:#1B3550;
  --line:rgba(243,236,219,.12); --text:#F3ECDB; --muted:#9FB2C6;
  --gold:#FFC93C; --gold-deep:#E6A92B; --coral:#FF5A3C; --azure:#43AEE0; --green:#36C98D;
  --shadow:0 18px 40px -22px rgba(0,0,0,.85); --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(255,201,60,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(67,174,224,.10), transparent 55%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text); font-family:"Outfit",system-ui,sans-serif; min-height:100dvh; padding-bottom:96px;
}
a{color:var(--azure)}
.wrap{max-width:620px;margin:0 auto;padding:0 16px}
header{position:relative;overflow:hidden;padding:26px 0 18px}
.brand{display:flex;align-items:center;gap:12px}
.crest{width:46px;height:46px;border-radius:12px;flex:none;background:linear-gradient(160deg,var(--gold),var(--coral));
  display:grid;place-items:center;font-family:"Anton";font-size:24px;color:#0A1524;box-shadow:0 6px 18px -6px var(--coral)}
.brand h1{font-family:"Anton";font-weight:400;letter-spacing:.5px;line-height:.92;margin:0;font-size:30px;text-transform:uppercase}
.brand h1 span{color:var(--gold)}
.brand .sub{margin:2px 0 0;font-size:12.5px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase}
.next{margin-top:18px;background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--line);
  border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:12px}
.next .lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.next .match{font-family:"Anton";font-size:20px;text-transform:uppercase;line-height:1;margin-top:3px}
.next .cd{font-family:"Space Mono";font-weight:700;text-align:right}
.next .cd b{display:block;font-size:22px;color:var(--gold)}
.next .cd small{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(10,21,36,.86);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
nav.tabs .inner{max-width:620px;margin:0 auto;display:flex;gap:6px}
nav.tabs button{flex:1;background:none;border:0;color:var(--muted);font-family:"Outfit";font-weight:600;font-size:11px;
  letter-spacing:.3px;padding:8px 4px 6px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:.18s}
nav.tabs button .ic{font-size:18px;line-height:1}
nav.tabs button.on{color:var(--gold);background:rgba(255,201,60,.10)}
section{padding:18px 0 4px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card.pad0{padding:6px}
.eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
h2.title{font-family:"Anton";font-weight:400;text-transform:uppercase;letter-spacing:.5px;font-size:24px;margin:6px 0 2px}
.match-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.match-head .rd{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.st{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.st.open{color:#0A1524;background:var(--green)}
.st.lock{color:var(--coral);background:rgba(255,90,60,.14)}
.st.done{color:var(--gold);background:rgba(255,201,60,.14)}
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin:14px 0 6px}
.team{text-align:center}
.team .nm{font-family:"Anton";font-size:17px;text-transform:uppercase;letter-spacing:.5px;line-height:1}
.team.col .nm{color:var(--gold)}
.stepper{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px}
.stepper button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--bg2);color:var(--text);font-size:20px;line-height:1;cursor:pointer}
.stepper button:active{transform:scale(.94)}
.digit{font-family:"Space Mono";font-weight:700;font-size:34px;min-width:34px;text-align:center;background:#08111d;border:1px solid var(--line);
  border-radius:10px;padding:4px 6px;color:var(--text);text-shadow:0 0 12px rgba(255,201,60,.25)}
.vs{font-family:"Space Mono";font-weight:700;color:var(--muted);font-size:22px}
.savebar{display:flex;align-items:center;gap:10px;margin-top:12px}
.btn{flex:1;background:var(--gold);color:#0A1524;border:0;border-radius:12px;padding:12px;font-family:"Outfit";font-weight:700;font-size:15px;cursor:pointer;transition:.15s}
.btn:active{transform:translateY(1px)}
.btn[disabled]{background:var(--surface2);color:var(--muted);cursor:not-allowed}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
.fin{font-family:"Space Mono";font-weight:700;font-size:13px;color:var(--muted)}
.fin b{color:var(--text)}
.pts-badge{font-family:"Space Mono";font-weight:700;font-size:13px;padding:3px 9px;border-radius:999px;background:rgba(255,201,60,.14);color:var(--gold)}
.cd-mini{font-family:"Space Mono";font-size:12px;color:var(--muted)}
/* chips selector */
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer}
.chip.on{background:var(--gold);color:#0A1524;border-color:var(--gold)}
/* live header */
.live-card{padding:18px 16px}
.lh{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.lt{text-align:center}
.lt .fl{font-size:32px;line-height:1}
.lt .tn{font-family:"Anton";font-size:14px;text-transform:uppercase;margin-top:5px;letter-spacing:.5px}
.lt.col .tn{color:var(--gold)}
.lt .cc{font-family:"Space Mono";font-size:12px;color:var(--muted);margin-top:2px}
.lc{text-align:center}
.ls{font-family:"Space Mono";font-weight:700;font-size:42px;line-height:1}
.ls .dash{color:var(--muted)}
.lpill{display:inline-block;margin-top:8px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:3px 11px;border-radius:999px;background:var(--bg2)}
.lpill.live{color:#fff;background:var(--coral);animation:pulse 1.4s infinite}
.lpill.fin{color:var(--gold);background:rgba(255,201,60,.14)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* table */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:9px 5px;text-align:center;border-bottom:1px solid var(--line)}
th{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:600}
td.nm,th.nm{text-align:left}
td.pos{font-family:"Anton";font-size:16px;color:var(--muted);width:26px}
tr.me td{background:rgba(67,174,224,.08)}
tr.p1 td.pos{color:var(--gold)} tr.p2 td.pos{color:#D7DEE6} tr.p3 td.pos{color:var(--coral)}
.num{font-family:"Space Mono";font-weight:700}
.tot{font-family:"Space Mono";font-weight:700;font-size:16px}
.pred{font-family:"Space Mono";font-weight:700;font-size:13px;color:var(--muted);background:var(--bg2);padding:3px 8px;border-radius:8px}
.pred.show{color:var(--text);background:#08111d;border:1px solid var(--line)}
.lp{font-family:"Space Mono";font-weight:700;font-size:12px;padding:3px 7px;border-radius:999px;color:var(--muted)}
.lp.b5{background:rgba(255,201,60,.16);color:var(--gold)}
.lp.b3{background:rgba(54,201,141,.16);color:var(--green)}
.lp.b2{background:rgba(67,174,224,.16);color:var(--azure)}
.lp.b0{background:rgba(159,178,198,.10);color:var(--muted)}
/* pozo */
.jackpot{text-align:center;padding:22px 16px;background:radial-gradient(120% 140% at 50% -20%,rgba(255,201,60,.18),transparent 60%),var(--surface);border:1px solid rgba(255,201,60,.25)}
.jackpot .lbl{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}
.jackpot .amt{font-family:"Space Mono";font-weight:700;font-size:42px;color:var(--gold);line-height:1.1;margin:6px 0}
.split{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.split .s{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 6px}
.split .s .p{font-family:"Anton";font-size:18px}
.split .s.one .p{color:var(--gold)} .split .s.two .p{color:#D7DEE6} .split .s.three .p{color:var(--coral)}
.split .s .who{font-size:12px;margin:2px 0;min-height:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.split .s .mny{font-family:"Space Mono";font-weight:700;font-size:13px;color:var(--text)}
.fxrow{display:flex;justify-content:space-between;align-items:center;padding:10px 2px;border-bottom:1px solid var(--line);font-size:14px}
.fxrow:last-child{border:0}
.tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.tag.acc{background:rgba(255,201,60,.14);color:var(--gold)}
.tag.pay{background:rgba(54,201,141,.14);color:var(--green)}
.tag.pen{background:rgba(159,178,198,.14);color:var(--muted)}
.tag.live{background:var(--coral);color:#fff;animation:pulse 1.4s infinite}
/* admin live control */
.livectl{display:flex;align-items:center;gap:16px;margin:8px 0 2px;flex-wrap:wrap}
.livectl .chk{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text);font-weight:600}
.livectl input[type=checkbox]{width:18px;height:18px;accent-color:var(--coral)}
.adminin{width:52px;background:#08111d;border:1px solid var(--line);border-radius:10px;padding:8px;color:var(--text);font-family:"Space Mono";font-weight:700;text-align:center;font-size:16px}
.adminin2{width:96px;background:#08111d;border:1px solid var(--line);border-radius:8px;padding:6px;color:var(--text);font-family:"Space Mono";text-align:center}
/* misc */
.field{margin:12px 0}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px}
.field input{width:100%;background:#08111d;border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--text);font-family:"Outfit";font-size:16px}
.center{text-align:center}.muted{color:var(--muted)}.small{font-size:12.5px}
.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(20px);background:var(--text);color:#0A1524;font-weight:600;padding:11px 18px;border-radius:999px;font-size:14px;opacity:0;transition:.25s;z-index:50;box-shadow:var(--shadow);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--coral);color:#fff}
.loader{display:grid;place-items:center;min-height:60dvh;color:var(--muted)}
.foot{padding:24px 0 8px;text-align:center;color:var(--muted);font-size:11.5px;letter-spacing:.5px}
</style>
</head>
<body>
<div id="app"><div class="loader">Cargando la polla…</div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   ⚙️  CONFIGURACIÓN — pega aquí tus 2 claves de Supabase
   (Settings → API → Project URL  ·  Settings → API Keys → Publishable key)
   ============================================================ */
const SUPABASE_URL  = "PEGA_AQUI_TU_PROJECT_URL";
const SUPABASE_ANON_KEY = "PEGA_AQUI_TU_ANON_KEY";
const APORTE = 10000;
/* ============================================================ */

const FLAGS = {"Uzbekistán":"🇺🇿","RD Congo":"🇨🇩","Portugal":"🇵🇹"};
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById("app");
let ME=null, S={fechas:[],preds:[],res:[],parts:[]}, TAB="pron", draft={}, FOCUS=null;

const fmtMoney = n => "$"+(n||0).toLocaleString("es-CO");
const sign = n => n>0?1:n<0?-1:0;
const flagOf = r => FLAGS[r] || "⚽";
function toast(msg,err){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show"+(err?" err":"");setTimeout(()=>t.className="toast",2200);}

(async function init(){
  if(SUPABASE_URL.startsWith("PEGA")){
    app.innerHTML = `<div class="wrap"><section><div class="card"><h2 class="title">Falta configurar</h2>
      <p class="muted small">Abre <b>index.html</b> y pega tu <b>Project URL</b> y tu clave en el bloque de configuración. Mira el README.</p></div></section></div>`; return;
  }
  let { data:{ session } } = await sb.auth.getSession();
  if(!session){ const r = await sb.auth.signInAnonymously(); if(r.error){fatal(r.error.message);return;} }
  await loadMe();
  if(!ME){ renderGate(); return; }
  await loadAll(); subscribe(); render();
})();
function fatal(m){ app.innerHTML=`<div class="wrap"><section><div class="card"><h2 class="title">No se pudo conectar</h2><p class="muted small">${m}</p></div></section></div>`; }

async function loadMe(){
  const { data:{ user } } = await sb.auth.getUser(); if(!user) return;
  const { data } = await sb.from("participantes").select("*").eq("id",user.id).maybeSingle();
  ME = data || null;
}
async function loadAll(){
  const [f,p,r,pa] = await Promise.all([
    sb.from("fechas").select("*").order("fecha"),
    sb.from("predicciones").select("*"),
    sb.from("resultados").select("*"),
    sb.from("participantes").select("*").order("created_at"),
  ]);
  S.fechas=f.data||[]; S.preds=p.data||[]; S.res=r.data||[]; S.parts=pa.data||[];
}
function subscribe(){
  sb.channel("polla").on("postgres_changes",{event:"*",schema:"public"}, async ()=>{ await loadAll(); render(true); }).subscribe();
}

/* ---------- cálculo ---------- */
function resOf(fecha){ return S.res.find(r=>r.fecha===fecha); }
function predOf(uid,fecha){ return S.preds.find(p=>p.user_id===uid && p.fecha===fecha); }
function points(pred,res){
  if(!pred||!res) return null;
  const a=pred.goles_col-pred.goles_riv, b=res.goles_col-res.goles_riv;
  if(pred.goles_col===res.goles_col && pred.goles_riv===res.goles_riv) return 5;
  if(a===b) return 3;
  if(sign(a)===sign(b)) return 2;
  return 0;
}
function cierre(f){ return new Date(new Date(f.kickoff).getTime() - 60000); }
function isLocked(f){ return Date.now() >= cierre(f).getTime() || !!resOf(f.fecha); }
function standings(){
  const rows = S.parts.map(pt=>{
    let pts=0,ex=0,tt=0,re=0,err=0;
    for(const f of S.fechas){
      const r=resOf(f.fecha), pr=predOf(pt.id,f.fecha), pp=points(pr,r);
      if(pp!==null){ pts+=pp; if(pp===5)ex++; else if(pp===3)tt++; else if(pp===2)re++;
        err += Math.abs(pr.goles_col-r.goles_col)+Math.abs(pr.goles_riv-r.goles_riv); }
    }
    return {id:pt.id,nombre:pt.nombre,created:pt.created_at,pts,ex,tt,re,err};
  });
  rows.sort((x,y)=> y.pts-x.pts || y.ex-x.ex || y.tt-x.tt || x.err-y.err || new Date(x.created)-new Date(y.created));
  rows.forEach((r,i)=>r.pos=i+1);
  return rows;
}
function getFocus(){
  if(FOCUS!=null){ const f=S.fechas.find(x=>x.fecha===FOCUS); if(f) return f; }
  const live=S.fechas.find(f=>f.en_vivo); if(live) return live;
  const withRes=S.fechas.filter(f=>resOf(f.fecha)); if(withRes.length) return withRes[withRes.length-1];
  const next=S.fechas.find(f=>!isLocked(f)); if(next) return next;
  return S.fechas[S.fechas.length-1];
}
function pozo(){
  let total=0; const fx=[];
  for(const f of S.fechas){
    const preds=S.preds.filter(p=>p.fecha===f.fecha);
    const r=resOf(f.fecha);
    const recaudo=APORTE*preds.length;
    const exactos=r?preds.filter(p=>points(p,r)===5):[];
    let estado="pen", acc=0;
    if(f.en_vivo) estado="live";
    else if(!r) estado="pen";
    else if(exactos.length>0) estado="pay";
    else { estado="acc"; acc=recaudo; total+=recaudo; }
    fx.push({f,preds:preds.length,recaudo,estado,acc,exactos});
  }
  return {total,fx};
}

/* ---------- shell ---------- */
function shell(body){
  const next = S.fechas.find(f=>!isLocked(f));
  return `
  <header><div class="wrap">
    <div class="brand"><div class="crest">★</div>
      <div><h1>Polla <span>Tricolor</span></h1><p class="sub">Mundial 2026 · Grupo K</p></div></div>
    ${next?`<div class="next">
      <div><div class="lbl">Próxima fecha abierta</div><div class="match">COL vs ${next.rival.replace(/Por definir.*/,'?')}</div></div>
      <div class="cd"><b id="cdBig">—</b><small>para el cierre</small></div></div>`:
      `<div class="next"><div><div class="lbl">Estado</div><div class="match">Todas cerradas</div></div></div>`}
  </div></header>
  <div class="wrap">${body}</div>
  <div class="foot">Hecho para la barra · puntos 5 / 3 / 2 · pozo 50 / 30 / 20</div>
  <nav class="tabs"><div class="inner">
    ${tabBtn("pron","🎯","Pronósticos")}
    ${tabBtn("tabla","🏆","Tabla")}
    ${tabBtn("pozo","💰","Pozo")}
    ${ME&&ME.is_admin?tabBtn("admin","⚙️","Resultados"):""}
  </div></nav>`;
}
const tabBtn=(id,ic,l)=>`<button class="${TAB===id?'on':''}" onclick="go('${id}')"><span class="ic">${ic}</span>${l}</button>`;
window.go=(t)=>{TAB=t;FOCUS=null;render();};

/* ---------- PRONÓSTICOS ---------- */
function viewPron(){
  let h=`<section><p class="eyebrow">Hola, ${ME.nombre}</p><h2 class="title">Tus pronósticos</h2>`;
  for(const f of S.fechas){
    const r=resOf(f.fecha), locked=isLocked(f), mine=predOf(ME.id,f.fecha);
    const d=draft[f.fecha]||{c:mine?mine.goles_col:0,r:mine?mine.goles_riv:0}; draft[f.fecha]=d;
    const pp=points(mine,r);
    const st = f.en_vivo?`<span class="st lock">🔴 En vivo</span>` : r?`<span class="st done">Final</span>` : locked?`<span class="st lock">Cerrado</span>`:`<span class="st open">Abierto</span>`;
    const rival = f.rival.replace(/Por definir \((.*)\)/,'$1');
    h+=`<div class="card">
      <div class="match-head"><span class="rd">Fecha ${f.fecha}${f.fecha>3?' · Eliminación':''}</span>${st}</div>
      <div class="scoreboard">
        <div class="team col"><div class="nm">Colombia</div>${stepper(f.fecha,'c',d.c,locked)}</div>
        <div class="vs">–</div>
        <div class="team"><div class="nm">${rival}</div>${stepper(f.fecha,'r',d.r,locked)}</div>
      </div>
      ${r?`<div class="savebar"><span class="fin">Resultado: <b>${r.goles_col} – ${r.goles_riv}</b></span>
            <span style="flex:1"></span>${pp!==null?`<span class="pts-badge">${mine?`+${pp} pts`:'sin pronóstico'}</span>`:''}</div>`
        : locked?`<div class="savebar"><span class="fin muted">Las apuestas de esta fecha están cerradas.</span></div>`
        : `<div class="savebar"><button class="btn" onclick="savePred(${f.fecha})">${mine?'Actualizar marcador':'Guardar marcador'}</button>
              <span class="cd-mini" id="cd${f.fecha}"></span></div>`}
    </div>`;
  }
  return h+`</section>`;
}
function stepper(fecha,k,val,locked){
  if(locked) return `<div class="stepper"><span class="digit">${val}</span></div>`;
  return `<div class="stepper"><button onclick="bump(${fecha},'${k}',-1)">−</button>
    <span class="digit" id="dg${fecha}${k}">${val}</span><button onclick="bump(${fecha},'${k}',1)">+</button></div>`;
}
window.bump=(fecha,k,delta)=>{const d=draft[fecha];d[k]=Math.max(0,Math.min(20,d[k]+delta));document.getElementById("dg"+fecha+k).textContent=d[k];};
async function savePred(fecha){
  const d=draft[fecha], f=S.fechas.find(x=>x.fecha===fecha);
  if(isLocked(f)){toast("Esa fecha ya cerró",true);return;}
  const { error } = await sb.from("predicciones").upsert({user_id:ME.id,fecha,goles_col:d.c,goles_riv:d.r,updated_at:new Date().toISOString()},{onConflict:"user_id,fecha"});
  if(error){toast("No se guardó: "+error.message,true);return;}
  await loadAll(); toast("Marcador guardado ⚽"); render();
}

/* ---------- TABLA (en vivo, estilo 365) ---------- */
function viewTabla(){
  const rows=standings(), focus=getFocus();
  let h=`<section><p class="eyebrow">Clasificación en vivo</p>`;
  h+=`<div class="chips">`+S.fechas.map(f=>
      `<button class="chip ${focus&&focus.fecha===f.fecha?'on':''}" onclick="setFocus(${f.fecha})">${f.en_vivo?'🔴 ':''}F${f.fecha}</button>`).join("")+`</div>`;
  if(focus) h+=liveHeader(focus);
  if(rows.length===0){ return h+`<div class="card"><p class="muted small center">Aún no hay participantes. ¡Sé el primero en pronosticar!</p></div></section>`; }
  const reveal = focus? isLocked(focus):false, res = focus?resOf(focus.fecha):null;
  h+=`<div class="card pad0"><table><thead><tr><th class="pos">#</th><th class="nm">Jugador</th><th>Pronóstico</th><th>Esta fecha</th><th>Total</th></tr></thead><tbody>`;
  for(const r of rows){
    const pr=focus?predOf(r.id,focus.fecha):null, lp=points(pr,res);
    const predTxt = !focus?'—' : !reveal?'🔒' : pr?`${pr.goles_col}-${pr.goles_riv}`:'—';
    const lpTxt = lp===null?'·':'+'+lp, lpcls = lp===5?'b5':lp===3?'b3':lp===2?'b2':lp===0?'b0':'';
    const cls=(r.id===ME.id?'me ':'')+(r.pos<=3?'p'+r.pos:'');
    h+=`<tr class="${cls}"><td class="pos">${r.pos}</td><td class="nm">${r.nombre}${r.id===ME.id?' · tú':''}</td>
      <td><span class="pred ${reveal&&pr?'show':''}">${predTxt}</span></td>
      <td><span class="lp ${lpcls}">${lpTxt}</span></td><td class="tot">${r.pts}</td></tr>`;
  }
  h+=`</tbody></table></div>`;
  h+= (focus && !reveal)
    ? `<p class="muted small">Los pronósticos de esta fecha se revelan al empezar el partido (cuando cierran las apuestas).</p>`
    : `<p class="muted small">Pronóstico = lo que marcó cada quien · “Esta fecha” = puntos que va ganando en vivo · Total = acumulado. Desempate: + exactos → + tanteadores → menor Δgol.</p>`;
  return h+`</section>`;
}
window.setFocus=(n)=>{FOCUS=n;render();};
function liveHeader(focus){
  const res=resOf(focus.fecha), rival=focus.rival.replace(/Por definir \((.*)\)/,'$1');
  const live=focus.en_vivo, locked=isLocked(focus);
  const score = res?`${res.goles_col}<span class="dash"> : </span>${res.goles_riv}`:`<span class="dash">– : –</span>`;
  let pill = live?`<span class="lpill live">🔴 ${focus.minuto?focus.minuto:'EN VIVO'}</span>`
    : res?`<span class="lpill fin">Final</span>` : locked?`<span class="lpill">Cerrado</span>`:`<span class="lpill" id="cdFocus">—</span>`;
  let cL='',cR='';
  if(locked){ const ps=S.preds.filter(p=>p.fecha===focus.fecha);
    cL=`(${ps.filter(p=>p.goles_col>p.goles_riv).length})`; cR=`(${ps.filter(p=>p.goles_riv>p.goles_col).length})`; }
  return `<div class="card live-card"><div class="lh">
      <div class="lt col"><div class="fl">🇨🇴</div><div class="tn">Colombia</div><div class="cc">${cL}</div></div>
      <div class="lc"><div class="ls">${score}</div>${pill}</div>
      <div class="lt"><div class="fl">${flagOf(focus.rival)}</div><div class="tn">${rival}</div><div class="cc">${cR}</div></div>
    </div></div>`;
}

/* ---------- POZO ---------- */
function viewPozo(){
  const {total,fx}=pozo(), rows=standings(), tops=[rows[0],rows[1],rows[2]];
  const pct=[.5,.3,.2], cls=["one","two","three"], lab=["1°","2°","3°"];
  let h=`<section><p class="eyebrow">El bote</p><h2 class="title">Pozo y premios</h2>
   <div class="card jackpot"><div class="lbl">Pozo acumulado</div><div class="amt">${fmtMoney(total)}</div>
     <div class="muted small">Se reparte entre el podio cuando Colombia salga del Mundial</div>
     <div class="split">${[0,1,2].map(i=>`<div class="s ${cls[i]}"><div class="p">${lab[i]}</div>
         <div class="who">${tops[i]?tops[i].nombre:'—'}</div><div class="mny">${fmtMoney(Math.round(total*pct[i]))}</div></div>`).join("")}</div></div>
   <div class="card"><p class="eyebrow">Por fecha</p>`;
  for(const x of fx){
    const tag = x.estado==="live"?`<span class="tag live">🔴 En vivo</span>`:x.estado==="acc"?`<span class="tag acc">Acumula</span>`
             : x.estado==="pay"?`<span class="tag pay">Pagado</span>`:`<span class="tag pen">Pendiente</span>`;
    const rival=x.f.rival.replace(/Por definir \((.*)\)/,'$1');
    h+=`<div class="fxrow"><div><b>F${x.f.fecha}</b> · ${rival}<br><span class="muted small">${x.preds} jugador${x.preds===1?'':'es'} · ${fmtMoney(x.recaudo)}</span></div>${tag}</div>`;
  }
  h+=`</div>`;
  const paid=fx.filter(x=>x.estado==="pay");
  if(paid.length){
    h+=`<div class="card"><p class="eyebrow">Ganadores por marcador exacto</p>`;
    for(const x of paid){
      const ord=[...x.exactos].sort((a,b)=>new Date(a.updated_at)-new Date(b.updated_at));
      const cuota=Math.round(x.recaudo/Math.min(4,ord.length));
      h+=`<div class="fxrow"><div><b>F${x.f.fecha}</b><br><span class="muted small">${fmtMoney(x.recaudo)} entre los 4 primeros</span></div>
        <div style="text-align:right">${ord.slice(0,4).map((p,i)=>{const nm=(S.parts.find(z=>z.id===p.user_id)||{}).nombre||'?';return `<div class="small">${i+1}. ${nm} · <b class="num">${fmtMoney(cuota)}</b></div>`;}).join("")}</div></div>`;
    }
    h+=`</div>`;
  }
  return h+`</section>`;
}

/* ---------- ADMIN ---------- */
function viewAdmin(){
  let h=`<section><p class="eyebrow">Panel del administrador</p><h2 class="title">Resultados</h2>
    <p class="muted small">Durante el partido: marca <b>🔴 En vivo</b>, escribe el minuto y ve actualizando el marcador (a todos se les mueve la tabla en vivo). Al terminar, quita "En vivo".</p>`;
  for(const f of S.fechas){
    const r=resOf(f.fecha), rival=f.rival.replace(/Por definir \((.*)\)/,'$1');
    h+=`<div class="card"><div class="match-head"><span class="rd">Fecha ${f.fecha} · ${rival}</span>${f.en_vivo?'<span class="st lock">🔴 En vivo</span>':''}</div>
      <div class="scoreboard">
        <div class="team col"><div class="nm">Colombia</div><div class="stepper"><input class="adminin" id="ra${f.fecha}c" type="number" min="0" value="${r?r.goles_col:''}" placeholder="–"></div></div>
        <div class="vs">–</div>
        <div class="team"><div class="nm">${rival}</div><div class="stepper"><input class="adminin" id="ra${f.fecha}r" type="number" min="0" value="${r?r.goles_riv:''}" placeholder="–"></div></div>
      </div>
      <div class="livectl">
        <label class="chk"><input type="checkbox" id="ev${f.fecha}" ${f.en_vivo?'checked':''}> 🔴 En vivo</label>
        <input class="adminin2" id="mn${f.fecha}" value="${f.minuto||''}" placeholder="min (ej. 73')">
      </div>
      <div class="savebar"><button class="btn" onclick="saveRes(${f.fecha})">Guardar (marcador + estado)</button></div>
      ${f.fecha>3?`<div class="field"><label>Rival y hora de inicio (UTC) de esta ronda</label>
        <input id="fr${f.fecha}" value="${f.rival}" style="margin-bottom:8px">
        <input id="fk${f.fecha}" value="${new Date(f.kickoff).toISOString().slice(0,16)}" type="datetime-local">
        <button class="btn ghost" style="margin-top:8px" onclick="saveFecha(${f.fecha})">Actualizar fecha</button></div>`:""}
    </div>`;
  }
  return h+`</section>`;
}
window.saveRes=async(fecha)=>{
  const cEl=document.getElementById("ra"+fecha+"c"), rEl=document.getElementById("ra"+fecha+"r");
  const ev=document.getElementById("ev"+fecha).checked, mn=document.getElementById("mn"+fecha).value||null;
  if(cEl.value!=="" && rEl.value!==""){
    const { error } = await sb.from("resultados").upsert({fecha,goles_col:+cEl.value,goles_riv:+rEl.value,updated_at:new Date().toISOString()},{onConflict:"fecha"});
    if(error){toast(error.message,true);return;}
  }
  if(ev){ await sb.from("fechas").update({en_vivo:false}).neq("fecha",fecha); }
  const { error:e2 } = await sb.from("fechas").update({en_vivo:ev,minuto:mn}).eq("fecha",fecha);
  if(e2){toast(e2.message,true);return;}
  await loadAll(); toast("Guardado"); render();
};
window.saveFecha=async(fecha)=>{
  const rival=document.getElementById("fr"+fecha).value, kk=new Date(document.getElementById("fk"+fecha).value).toISOString();
  const { error } = await sb.from("fechas").update({rival,kickoff:kk}).eq("fecha",fecha);
  if(error){toast(error.message,true);return;}
  await loadAll(); toast("Fecha actualizada"); render();
};

/* ---------- gate ---------- */
function renderGate(){
  app.innerHTML = `<div class="wrap"><header><div class="brand"><div class="crest">★</div>
    <div><h1>Polla <span>Tricolor</span></h1><p class="sub">Mundial 2026 · Grupo K</p></div></div></header>
    <section><div class="card"><h2 class="title">¿Cómo te llamas?</h2>
      <p class="muted small">Así te verán los demás en la tabla. Se queda guardado en este dispositivo.</p>
      <div class="field"><input id="nm" placeholder="Tu nombre" maxlength="24"></div>
      <button class="btn" onclick="saveName()">Entrar a la polla</button></div></section></div>`;
  setTimeout(()=>document.getElementById("nm").focus(),100);
}
window.saveName=async()=>{
  const nombre=document.getElementById("nm").value.trim();
  if(nombre.length<2){toast("Escribe tu nombre",true);return;}
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from("participantes").insert({id:user.id,nombre});
  if(error){toast(error.message,true);return;}
  await loadMe(); await loadAll(); subscribe(); render();
};

/* ---------- render ---------- */
function render(silent){
  let body = TAB==="pron"?viewPron(): TAB==="tabla"?viewTabla(): TAB==="pozo"?viewPozo(): viewAdmin();
  app.innerHTML = shell(body); tickCountdowns();
}
function tickCountdowns(){
  const upd=()=>{
    const next=S.fechas.find(f=>!isLocked(f)), big=document.getElementById("cdBig");
    if(next&&big) big.textContent=remain(cierre(next));
    for(const f of S.fechas){ const el=document.getElementById("cd"+f.fecha); if(el&&!isLocked(f)) el.textContent="cierra en "+remain(cierre(f)); }
    const fc=getFocus(), el2=document.getElementById("cdFocus");
    if(el2&&fc&&!isLocked(fc)) el2.textContent="Inicia en "+remain(new Date(fc.kickoff));
  };
  upd(); clearInterval(window._t); window._t=setInterval(upd,1000);
}
function remain(d){
  let s=Math.max(0,Math.floor((d.getTime()-Date.now())/1000));
  const dd=Math.floor(s/86400);s%=86400;const h=Math.floor(s/3600);s%=3600;const m=Math.floor(s/60);s%=60;
  if(dd>0)return `${dd}d ${h}h`;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
